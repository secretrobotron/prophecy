name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: environment.yml
        activate-environment: prophecy
        auto-activate-base: false
        
    - name: Install pytest
      shell: bash -l {0}
      run: |
        conda install -c conda-forge pytest
        
    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest tests/ -v