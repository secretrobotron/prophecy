name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main, feature/prompt-filtering-and-query]
  workflow_dispatch:

# Pages is global state — never run two deploys concurrently.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Export cached results bundle
        # Writes dist/data/{index.json,prompts.json,stories.json,results/*.jsonl}.
        # The viewer (HTML/CSS/JS) is copied alongside so it can fetch from ./data/.
        run: uv run python -m prophecy export --out dist/data

      - name: Stage viewer files into dist/
        run: cp viewer/index.html viewer/styles.css viewer/app.js dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
